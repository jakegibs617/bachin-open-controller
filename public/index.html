<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bachin Open Controller</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }

    #root {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 16px;
      font-weight: bold;
      border-bottom: 2px solid #34495e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    header > div {
      font-size: 20px;
    }

    nav {
      display: flex;
      gap: 8px;
    }

    button,
    select,
    input {
      font: inherit;
    }

    nav button {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: transparent;
      color: white;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    nav button.active {
      background: white;
      color: #2c3e50;
    }

    main {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    h2 {
      margin-bottom: 16px;
    }

    h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .settings-page,
    .canvas-page,
    .controls-page {
      max-width: 720px;
    }

    .settings-section {
      margin-bottom: 20px;
    }

    .settings-section label,
    .field-row label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .settings-section select,
    .field-row select,
    .field-row input {
      min-width: 220px;
      padding: 6px 8px;
    }

    .control-section {
      margin-bottom: 20px;
      padding: 16px;
      border: 1px solid #d4dce0;
      background: #fff;
      border-radius: 6px;
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto;
      gap: 8px;
      align-items: end;
      max-width: 560px;
      margin-bottom: 12px;
    }

    .field-row:last-child {
      margin-bottom: 0;
    }

    .field-row label {
      grid-column: 1 / -1;
    }

    .field-row button,
    .pen-button {
      border: 0;
      border-radius: 4px;
      padding: 8px 12px;
      color: #fff;
      background: #2c3e50;
      cursor: pointer;
    }

    .field-row button:disabled,
    .pen-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .pen-state {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 360px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #d4dce0;
      background: #f8fafb;
    }

    .pen-state span {
      color: #5f6c72;
      font-size: 13px;
      font-weight: 600;
    }

    .pen-state.down {
      border-color: #1f7a4d;
      background: #eef8f2;
    }

    .pen-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 180px));
      gap: 12px;
    }

    .pen-button {
      min-height: 56px;
      font-size: 18px;
      font-weight: 700;
    }

    .pen-button.down {
      background: #1f7a4d;
    }

    .pen-button.up {
      background: #8a3c24;
    }

    .status-message,
    .error-message {
      max-width: 560px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .error-message {
      color: #b3261e;
      font-weight: 600;
    }

    dl {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 12px;
      max-width: 360px;
    }

    dt {
      color: #5f6c72;
      font-size: 13px;
      font-weight: 600;
    }

    dd {
      margin-top: 2px;
      font-size: 18px;
      font-weight: 600;
    }

    .work-area-preview {
      width: min(100%, 360px);
      aspect-ratio: 210 / 297;
      border: 2px solid #34495e;
      background: white;
      display: grid;
      place-content: center;
      gap: 8px;
      color: #2c3e50;
      font-weight: 600;
    }

    .work-area-preview span {
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./index.jsx"></script>
</body>
</html>
