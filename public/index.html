<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bachin Open Controller</title>
  <style>
    /* ── Design tokens ─────────────────────────────────── */
    :root {
      --primary:           #2c3e50;
      --primary-dim:       #243342;
      --on-primary:        #ffffff;
      --primary-container: #e6ecf1;

      --surface:           #ffffff;
      --surface-low:       #f4f6f8;
      --surface-mid:       #e8ecf0;
      --background:        #f0f2f5;
      --on-surface:        #1a1c1e;
      --on-surface-sub:    #5f6c72;
      --outline:           #c0cad2;
      --outline-faint:     #dde3e9;
      --control-bg:        #ffffff;
      --progress-track:    #e5e7eb;
      --focus-ring:        #5b7fa3;

      --success:           #1f7a4d;
      --success-surface:   #eef8f2;
      --danger:            #b3261e;
      --danger-dim:        #9b1f18;
      --pen-up:            #8a3c24;
      --warn-fg:           #8a5a00;
      --accent-blue:       #2563eb;
      --canvas-paper:      #ffffff;
      --canvas-border:     #d4dce0;
      --canvas-grid-minor: #dce2e8;
      --canvas-grid-major: #b8c4ce;
      --plot-done:         #16a34a;
      --plot-pending:      #9ca3af;

      --r-sm:  6px;
      --r-md:  12px;
      --r-full: 100px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.07);
      --shadow-md: 0 2px 4px rgba(0,0,0,0.10), 0 4px 10px rgba(0,0,0,0.08);
    }

    .app[data-theme="dark"] {
      color-scheme: dark;
      --primary:           #8fb6df;
      --primary-dim:       #6f9bca;
      --on-primary:        #061421;
      --primary-container: #1b344a;

      --surface:           #18212b;
      --surface-low:       #111922;
      --surface-mid:       #243140;
      --background:        #0d1218;
      --on-surface:        #edf3f8;
      --on-surface-sub:    #a8b6c2;
      --outline:           #435363;
      --outline-faint:     #2b3946;
      --control-bg:        #101821;
      --progress-track:    #263341;
      --focus-ring:        #9fc4ea;

      --success:           #5fd08f;
      --success-surface:   #183225;
      --danger:            #ff8f86;
      --danger-dim:        #e06f67;
      --pen-up:            #d89272;
      --warn-fg:           #e7bd64;
      --accent-blue:       #8bb8ff;
      --canvas-paper:      #f8fafc;
      --canvas-border:     #53606b;
      --canvas-grid-minor: #d7dde3;
      --canvas-grid-major: #9aa7b3;
      --plot-done:         #22c55e;
      --plot-pending:      #7d8791;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.35), 0 1px 6px rgba(0,0,0,0.25);
      --shadow-md: 0 2px 4px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.28);
    }

    /* ── Reset & base ──────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--background);
      color: var(--on-surface);
      font-size: 14px;
      line-height: 1.45;
    }

    #root { width: 100%; height: 100vh; display: flex; flex-direction: column; }

    button, select, input { font: inherit; }

    h2 { font-size: 19px; font-weight: 600; margin-bottom: 18px; }

    h3 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--on-surface-sub);
      margin-bottom: 12px;
    }

    /* ── App shell ─────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--background);
      color: var(--on-surface);
    }

    /* ── Top App Bar ───────────────────────────────────── */
    .app-header {
      background: var(--primary);
      color: var(--on-primary);
      box-shadow: var(--shadow-md);
      z-index: 10;
      flex-shrink: 0;
    }

    .app-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 0 16px;
      height: 46px;
      gap: 16px;
    }

    .app-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.1px;
    }

    .app-version {
      font-size: 11px;
      opacity: 0.5;
      font-weight: 400;
      margin-left: 6px;
    }

    .app-bar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 30px;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: var(--r-full);
      background: rgba(255,255,255,0.10);
      color: var(--on-primary);
      padding: 4px 10px 4px 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .theme-toggle:hover { background: rgba(255,255,255,0.18); }

    .theme-toggle:focus-visible {
      outline: 2px solid rgba(255,255,255,0.75);
      outline-offset: 2px;
    }

    .theme-toggle-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--on-primary);
      box-shadow: inset -5px -4px 0 rgba(0,0,0,0.35);
      flex: 0 0 auto;
    }

    .app[data-theme="dark"] .theme-toggle-icon {
      box-shadow: inset 0 0 0 4px rgba(6,20,33,0.95);
    }

    @media (max-width: 460px) {
      .app-bar { gap: 10px; }
      .theme-toggle-text,
      .conn-chip span:last-child { display: none; }
      .theme-toggle { padding: 5px 7px; }
    }

    /* Connection status chip */
    .conn-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0.8;
      user-select: none;
    }

    .conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.30);
      transition: background 0.3s;
    }

    .conn-dot.on {
      background: #4ade80;
      box-shadow: 0 0 0 2px rgba(74,222,128,0.25);
    }

    /* ── Navigation tabs ───────────────────────────────── */
    .app-nav {
      display: flex;
      width: min(100%, 960px);
      margin: 0 auto;
      border-top: 1px solid rgba(255,255,255,0.10);
    }

    .app-nav button {
      flex: 1;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: rgba(255,255,255,0.60);
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .app-nav button:hover { color: rgba(255,255,255,0.88); }

    .app-nav button.active {
      color: #fff;
      border-bottom-color: #fff;
    }

    /* ── Main scroll area ──────────────────────────────── */
    main {
      flex: 1;
      overflow: auto;
      padding: clamp(16px, 2.5vw, 28px) clamp(14px, 4vw, 40px);
      background: var(--background);
    }

    /* ── Page max-widths ───────────────────────────────── */
    .canvas-page,
    .settings-page {
      width: min(100%, 820px);
      margin: 0 auto;
    }

    .controls-page {
      width: min(100%, 960px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 20px;
      align-items: start;
    }

    .controls-main,
    .controls-setup {
      min-width: 0;
    }

    .controls-page > .status-message,
    .controls-page > .error-message {
      grid-column: 1 / -1;
    }

    @media (max-width: 620px) {
      .controls-page {
        grid-template-columns: 1fr;
      }
    }

    /* ── Card ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-sm);
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--on-surface-sub);
      margin-bottom: 14px;
    }

    /* ── Connection status bar (collapsed state) ───────── */
    .connection-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .connection-bar .conn-dot { width: 9px; height: 9px; }

    .conn-text {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: var(--success);
    }

    /* ── Buttons ───────────────────────────────────────── */
    .btn-text {
      border: none;
      background: transparent;
      color: var(--on-surface-sub);
      font-size: 13px;
      padding: 4px 6px;
      cursor: pointer;
      border-radius: var(--r-sm);
    }

    .btn-text:hover { color: var(--on-surface); background: var(--surface-low); }

    .btn-primary {
      background: var(--primary) !important;
      color: var(--on-primary) !important;
      border-color: transparent !important;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary:hover { background: var(--primary-dim) !important; }

    /* ── Field row (label + input + action) ────────────── */
    .field-row {
      display: grid;
      grid-template-columns: minmax(140px, 1fr) auto;
      gap: 8px;
      align-items: end;
      max-width: 520px;
      margin-bottom: 12px;
    }

    .field-row:last-child { margin-bottom: 0; }

    .field-row label {
      grid-column: 1 / -1;
      font-weight: 600;
      font-size: 13px;
      color: var(--on-surface-sub);
      display: block;
      margin-bottom: 3px;
    }

    .field-row select,
    .field-row input:not([type="range"]):not([type="checkbox"]) {
      padding: 7px 10px;
      border: 1px solid var(--outline);
      border-radius: var(--r-sm);
      background: var(--control-bg);
      color: var(--on-surface);
    }

    .field-row select:focus,
    .field-row input:focus {
      outline: 2px solid var(--focus-ring);
      outline-offset: -1px;
      border-color: transparent;
    }

    .field-row button {
      border: 1px solid var(--outline);
      border-radius: var(--r-sm);
      padding: 7px 14px;
      background: var(--surface);
      color: var(--on-surface);
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
    }

    .field-row button:hover { background: var(--surface-low); }

    .field-row button:disabled,
    .pen-button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .field-row .stop-button {
      background: var(--danger);
      color: #fff;
      border-color: transparent;
    }

    .field-row .stop-button:hover { background: var(--danger-dim); }

    /* ── Pen control ───────────────────────────────────── */
    .pen-state {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 340px;
      margin-bottom: 14px;
      padding: 10px 14px;
      border-radius: var(--r-sm);
      border: 1px solid var(--outline-faint);
      background: var(--surface-low);
    }

    .pen-state span {
      color: var(--on-surface-sub);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pen-state strong { font-size: 15px; }

    .pen-state.down {
      border-color: var(--success);
      background: var(--success-surface);
    }

    .pen-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 160px));
      gap: 10px;
      margin-bottom: 14px;
    }

    .pen-button {
      min-height: 52px;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: var(--r-sm);
      color: #fff;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }

    .pen-button.down { background: var(--success); }
    .pen-button.up   { background: var(--pen-up); }

    /* ── Origin + stop row ─────────────────────────────── */
    .origin-row { margin-top: 10px; }

    /* ── Jog pad ───────────────────────────────────────── */
    .jog-readout { margin-bottom: 12px; }

    .jog-pad {
      display: grid;
      grid-template-columns: repeat(3, 66px);
      grid-template-rows: repeat(3, 42px);
      gap: 6px;
      max-width: 212px;
      margin-top: 12px;
    }

    .jog-pad button {
      border: none;
      border-radius: var(--r-sm);
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .jog-pad button:hover { background: var(--primary-dim); }
    .jog-pad button:disabled { opacity: 0.38; cursor: not-allowed; }

    .jog-pad button:nth-child(1) { grid-column: 2; grid-row: 1; }
    .jog-pad button:nth-child(2) { grid-column: 1; grid-row: 2; }
    .jog-pad button:nth-child(3) { grid-column: 3; grid-row: 2; }
    .jog-pad button:nth-child(4) { grid-column: 2; grid-row: 3; }

    /* ── Data readout lists ────────────────────────────── */
    dl {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: 10px;
      max-width: 340px;
    }

    dt {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--on-surface-sub);
    }

    dd {
      margin-top: 2px;
      font-size: 18px;
      font-weight: 600;
    }

    .job-readout {
      grid-template-columns: minmax(160px, 1fr) minmax(80px, 120px);
      max-width: 520px;
      margin-bottom: 12px;
    }

    .canvas-readout { margin-top: 12px; }

    .job-readout dd { overflow-wrap: anywhere; }

    /* ── Messages ──────────────────────────────────────── */
    .status-message,
    .error-message {
      max-width: 540px;
      margin-top: 10px;
      line-height: 1.5;
      font-size: 13px;
      color: var(--on-surface-sub);
    }

    .error-message { color: var(--danger); font-weight: 600; }

    .hint {
      color: var(--on-surface-sub);
      font-size: 13px;
      line-height: 1.5;
    }

    .progress-label {
      font-size: 13px;
      color: var(--on-surface-sub);
      align-self: center;
    }

    /* ── Warning list ──────────────────────────────────── */
    .warning-list {
      max-width: 620px;
      margin: 10px 0;
      padding-left: 20px;
      line-height: 1.5;
      font-size: 13px;
    }

    .warning-list .warn  { color: var(--warn-fg); }
    .warning-list .error { color: var(--danger); font-weight: 600; }

    /* ── Canvas toolbar ────────────────────────────────── */
    .canvas-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .canvas-toolbar label { font-weight: 600; font-size: 13px; }

    .canvas-toolbar input[type="file"] { min-width: 230px; }

    .canvas-toolbar select {
      padding: 5px 8px;
      border: 1px solid var(--outline);
      border-radius: var(--r-sm);
      background: var(--control-bg);
      font-size: 13px;
      color: var(--on-surface);
    }

    /* ── Toolbar pill buttons ──────────────────────────── */
    .toolbar-btn {
      padding: 5px 14px;
      border: 1px solid var(--outline);
      border-radius: var(--r-full);
      background: var(--surface);
      color: var(--on-surface);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .toolbar-btn:hover { background: var(--surface-low); }

    .toolbar-btn.active {
      background: var(--primary);
      color: var(--on-primary);
      border-color: transparent;
    }

    /* ── Raster settings strip ─────────────────────────── */
    .raster-settings {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface-low);
      border-radius: var(--r-sm);
      margin-bottom: 12px;
      border: 1px solid var(--outline-faint);
    }

    .raster-settings label {
      font-size: 12px;
      font-weight: 600;
      color: var(--on-surface-sub);
    }

    .raster-settings select {
      padding: 4px 8px;
      border: 1px solid var(--outline);
      border-radius: var(--r-sm);
      background: var(--control-bg);
      font-size: 13px;
      color: var(--on-surface);
    }

    .raster-settings input[type="range"] {
      min-width: 130px;
      accent-color: var(--primary);
    }

    .raster-settings .check-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--on-surface-sub);
    }

    .action-speed-settings {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr)) auto;
      gap: 12px;
      align-items: end;
      padding: 10px 14px;
      background: var(--surface-low);
      border-radius: var(--r-sm);
      margin-bottom: 12px;
      border: 1px solid var(--outline-faint);
    }

    .speed-slider-control {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .speed-slider-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .action-speed-settings label,
    .speed-slider-heading output {
      font-size: 12px;
      font-weight: 600;
    }

    .action-speed-settings label {
      color: var(--on-surface-sub);
    }

    .speed-slider-heading output {
      color: var(--on-surface);
      white-space: nowrap;
    }

    .speed-slider-track {
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }

    .action-speed-settings input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--primary);
    }

    .speed-optimal-marker {
      position: absolute;
      top: 3px;
      width: 2px;
      height: 18px;
      border-radius: var(--r-full);
      background: var(--on-surface-sub);
      pointer-events: none;
      transform: translateX(-50%);
    }

    .speed-slider-scale {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      font-size: 10px;
      color: var(--on-surface-sub);
      line-height: 1.2;
    }

    .speed-slider-scale span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    @media (max-width: 780px) {
      .action-speed-settings {
        grid-template-columns: 1fr;
      }
    }

    /* ── SVG canvas preview ────────────────────────────── */
    .work-area-preview {
      width: min(100%, 440px);
      aspect-ratio: 180 / 210;
      margin-inline: auto;
      border: 1px solid var(--outline);
      background: var(--canvas-paper);
      display: grid;
      place-content: center;
      gap: 8px;
      color: var(--on-surface);
      font-weight: 600;
      border-radius: var(--r-sm);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .svg-preview {
      width: min(100%, 440px);
      place-content: stretch;
      overflow: hidden;
    }

    .svg-preview svg { width: 100%; height: 100%; display: block; }

    /* ── Image transform strip ─────────────────────────── */
    .image-transform-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      align-items: center;
      max-width: 660px;
      margin-top: 10px;
      padding: 10px 14px;
      background: var(--surface-low);
      border-radius: var(--r-sm);
      border: 1px solid var(--outline-faint);
    }

    .image-transform-controls label {
      font-size: 12px;
      font-weight: 600;
      color: var(--on-surface-sub);
    }

    .image-transform-controls input[type="number"] {
      width: 58px;
      padding: 4px 6px;
      border: 1px solid var(--outline);
      border-radius: var(--r-sm);
      background: var(--control-bg);
      color: var(--on-surface);
    }

    .image-transform-controls #img-scale-number { width: 52px; }

    .image-transform-controls input[type="range"] {
      min-width: 100px;
      accent-color: var(--primary);
    }

    .unit-label {
      font-size: 12px;
      color: var(--on-surface-sub);
      margin-right: 4px;
    }

    /* ── Settings ──────────────────────────────────────── */
    .settings-section { margin-bottom: 0; }

    .settings-section label,
    .field-row label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: var(--on-surface-sub);
      margin-bottom: 6px;
    }

    .settings-section select {
      min-width: 200px;
      padding: 7px 10px;
      border: 1px solid var(--outline);
      border-radius: var(--r-sm);
      background: var(--control-bg);
      color: var(--on-surface);
    }

    .settings-section select:focus {
      outline: 2px solid var(--focus-ring);
      outline-offset: -1px;
      border-color: transparent;
    }

    /* ── Section group label ───────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--on-surface-sub);
      margin-bottom: 6px;
      margin-top: 4px;
      padding: 0 2px;
    }

    /* ── Collapsible card (details / summary) ──────────── */
    details.card { padding: 0; overflow: hidden; }

    details.card > summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      padding: 14px 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--on-surface-sub);
    }

    details.card > summary::-webkit-details-marker { display: none; }
    details.card > summary::marker { display: none; }

    details.card > summary::after {
      content: '▸';
      font-size: 11px;
      opacity: 0.5;
      transition: transform 0.15s;
    }

    details[open].card > summary::after { transform: rotate(90deg); }

    details[open].card > summary {
      border-bottom: 1px solid var(--outline-faint);
    }

    .card-body { padding: 16px 20px; }

    /* ── Raster mode hint ──────────────────────────────── */
    .raster-settings-hint {
      flex: 0 0 100%;
      font-size: 12px;
      color: var(--on-surface-sub);
      line-height: 1.4;
      padding-top: 6px;
      margin-top: 2px;
      border-top: 1px solid var(--outline-faint);
    }
  </style>
</head>

  <div id="root"></div>
  <script src="./index.jsx"></script>
</body>
